<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARI MENYANYI</title>
    <meta name="apple-mobile-web-app-title" content="MARI MENYANYI">
    <meta name="application-name" content="MARI MENYANYI">
    
    <!-- Ikon Aplikasi -->
    <link rel="icon" type="image/jpeg" href="image_7ec5c4.jpg">
    <link rel="apple-touch-icon" href="image_7ec5c4.jpg">
    <meta name="msapplication-TileImage" content="image_7ec5c4.jpg">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #f5f7ff 0%, #f0f0ff 50%, #fff0f5 100%);
            background-attachment: fixed;
        }

        .tab-active { 
            border-bottom: 4px solid #6366f1; 
            color: #6366f1; 
            background-color: rgba(99, 102, 241, 0.05); 
        }

        .bg-cikgu { 
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); 
        }

        .glass-card { 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.6); 
        }

        /* PERATURAN CETAKAN */
        @media print {
            header, nav, #regForm, #judgeForm, .no-print, button, #syncStatus {
                display: none !important;
            }
            body { background: white !important; }
            main { margin: 0; padding: 0; width: 100%; }
            section { display: none !important; }
            #page-statistik { display: block !important; padding: 20px; }
            .glass-card { border: 1px solid #ddd; box-shadow: none !important; backdrop-filter: none; background: white; }
            #topThreeCards { 
                display: grid !important; 
                grid-template-columns: repeat(3, 1fr) !important; 
                gap: 15px !important; 
                margin-bottom: 30px;
            }
            .print-header { display: block !important; text-align: center; margin-bottom: 30px; }
            table { width: 100% !important; border-collapse: collapse; margin-top: 20px; }
            th, td { border: 1px solid #ddd !important; padding: 10px !important; font-size: 10pt !important; }
            .rank-gold { background-color: #fefce8 !important; }
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen">

    <!-- Header & Navigasi -->
    <header class="bg-white/90 backdrop-blur-md border-b border-indigo-100 sticky top-0 z-20 shadow-sm no-print">
        <div class="max-w-5xl mx-auto px-4">
            <div class="flex items-center justify-between py-4">
                <div class="flex items-center gap-3">
                    <div class="shadow-lg rounded-xl overflow-hidden border-2 border-white ring-2 ring-indigo-100 bg-white">
                        <img src="image_7ec5c4.jpg" class="w-12 h-12 object-cover" alt="Logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3059/3059518.png'">
                    </div>
                    <div>
                        <h1 class="text-2xl font-black text-slate-800 tracking-tight uppercase leading-none italic">MARI MENYANYI</h1>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <div id="syncStatus" title="Sistem Bersambung" class="flex items-center gap-1 text-[10px] font-bold text-emerald-500 bg-emerald-50 px-3 py-2 rounded-full uppercase border border-emerald-100">
                        <span class="w-3 h-3 bg-emerald-500 rounded-full animate-pulse"></span>
                    </div>
                    <button onclick="resetData()" class="text-[10px] text-red-500 hover:bg-red-50 font-bold flex items-center gap-1 border border-red-200 px-3 py-2 rounded-xl transition-all">
                        <i data-lucide="trash-2" class="w-3 h-3"></i> PADAM DATA
                    </button>
                </div>
            </div>
            
            <nav class="flex gap-4 overflow-x-auto no-scrollbar pb-1">
                <button onclick="switchTab('pendaftaran')" id="btn-pendaftaran" class="tab-active py-3 px-4 text-xs font-bold flex items-center gap-2 transition-all rounded-t-xl whitespace-nowrap">
                    <i data-lucide="user-plus" class="w-4 h-4"></i> PENDAFTARAN
                </button>
                <button onclick="switchTab('pemarkahan')" id="btn-pemarkahan" class="py-3 px-4 text-xs font-bold text-slate-500 flex items-center gap-2 transition-all rounded-t-xl whitespace-nowrap hover:bg-slate-50">
                    <i data-lucide="edit-3" class="w-4 h-4"></i> PEMARKAHAN
                </button>
                <button onclick="switchTab('statistik')" id="btn-statistik" class="py-3 px-4 text-xs font-bold text-slate-500 flex items-center gap-2 transition-all rounded-t-xl whitespace-nowrap hover:bg-slate-50">
                    <i data-lucide="trophy" class="w-4 h-4"></i> RUMUSAN PEMENANG
                </button>
            </nav>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 md:p-6 mt-4">
        
        <!-- MODUL 1: PENDAFTARAN -->
        <section id="page-pendaftaran" class="space-y-6">
            <div class="glass-card p-8 rounded-[2rem] shadow-xl shadow-indigo-100/50 border-t-4 border-t-indigo-500">
                <div class="flex items-center gap-2 mb-6">
                    <div class="bg-indigo-100 p-2 rounded-lg text-indigo-600">
                        <i data-lucide="user-plus" class="w-5 h-5"></i>
                    </div>
                    <h2 class="text-lg font-black text-slate-800 uppercase tracking-wider">Daftar Peserta</h2>
                </div>
                <form id="regForm" class="flex flex-col md:flex-row gap-4">
                    <div class="flex-1 relative">
                        <input type="text" id="regName" required class="w-full pl-12 pr-4 py-4 border-2 border-indigo-50 rounded-2xl focus:ring-4 focus:ring-indigo-100 focus:border-indigo-400 outline-none text-sm font-bold transition-all" placeholder="Taip nama peserta di sini...">
                        <i data-lucide="user" class="absolute left-4 top-1/2 -translate-y-1/2 text-indigo-300 w-5 h-5"></i>
                    </div>
                    <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white font-black px-10 py-4 rounded-2xl flex items-center justify-center gap-2 transition-all shadow-lg shadow-indigo-200 hover:-translate-y-1 active:scale-95">
                        SIMPAN NAMA
                    </button>
                </form>
            </div>

            <div class="bg-white/70 backdrop-blur-sm rounded-[2rem] border border-indigo-50 overflow-hidden shadow-xl shadow-slate-200/50">
                <div class="p-6 bg-gradient-to-r from-indigo-50 to-purple-50 border-b border-indigo-100 flex items-center gap-2">
                    <i data-lucide="list" class="w-4 h-4 text-indigo-500"></i>
                    <h3 class="text-xs font-black text-indigo-900 uppercase tracking-widest">Senarai Peserta Berdaftar</h3>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-white/50 border-b border-slate-100">
                            <tr>
                                <th class="px-8 py-4 text-[10px] font-black text-slate-400 uppercase">Bil</th>
                                <th class="px-8 py-4 text-[10px] font-black text-slate-400 uppercase">Nama Peserta</th>
                                <th class="px-8 py-4 text-[10px] font-black text-slate-400 uppercase text-center">Status</th>
                                <th class="px-8 py-4 text-[10px] font-black text-slate-400 uppercase text-right">Tindakan</th>
                            </tr>
                        </thead>
                        <tbody id="regList" class="divide-y divide-slate-50">
                            <tr><td colspan="4" class="p-12 text-center text-slate-400 italic">Sedang memuatkan data...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>

        <!-- MODUL 2: PEMARKAHAN -->
        <section id="page-pemarkahan" class="hidden space-y-6">
            <div class="glass-card p-8 rounded-[2rem] shadow-xl shadow-purple-100/50 border-t-4 border-t-purple-500">
                <div class="flex items-center gap-2 mb-6">
                    <div class="bg-purple-100 p-2 rounded-lg text-purple-600">
                        <i data-lucide="edit-3" class="w-5 h-5"></i>
                    </div>
                    <h2 class="text-lg font-black text-slate-800 uppercase tracking-wider">Kemasukan Markah</h2>
                </div>
                
                <div class="mb-8 relative">
                    <label class="block text-[10px] font-black text-slate-400 mb-2 uppercase tracking-widest pl-1">Pilih Nama Peserta</label>
                    <select id="judgeSelect" class="w-full px-6 py-4 border-2 border-purple-50 rounded-2xl focus:ring-4 focus:ring-purple-100 focus:border-purple-400 outline-none appearance-none bg-white font-bold text-slate-700 shadow-sm transition-all cursor-pointer">
                        <option value="">-- Sila Pilih Nama Peserta --</option>
                    </select>
                    <i data-lucide="chevron-down" class="absolute right-6 bottom-4 text-purple-300 w-6 h-6 pointer-events-none"></i>
                </div>

                <form id="judgeForm" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4 opacity-20 pointer-events-none transition-all duration-500 scale-95 origin-top">
                    <div class="space-y-2 bg-white p-4 rounded-2xl border-2 border-indigo-50 shadow-sm">
                        <label class="block text-[10px] font-black text-indigo-400 uppercase tracking-tighter">Vokal (40%)</label>
                        <input type="number" id="v_vocal" min="0" max="40" step="0.1" required class="w-full px-4 py-3 bg-indigo-50 border-transparent rounded-xl focus:bg-white focus:ring-2 focus:ring-indigo-300 outline-none font-black text-indigo-700 text-xl" placeholder="0">
                    </div>
                    <div class="space-y-2 bg-white p-4 rounded-2xl border-2 border-blue-50 shadow-sm">
                        <label class="block text-[10px] font-black text-blue-400 uppercase tracking-tighter">Tempo (20%)</label>
                        <input type="number" id="v_tempo" min="0" max="20" step="0.1" required class="w-full px-4 py-3 bg-blue-50 border-transparent rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-300 outline-none font-black text-blue-700 text-xl" placeholder="0">
                    </div>
                    <div class="space-y-2 bg-white p-4 rounded-2xl border-2 border-emerald-50 shadow-sm">
                        <label class="block text-[10px] font-black text-emerald-400 uppercase tracking-tighter">Hayati (20%)</label>
                        <input type="number" id="v_penghayatan" min="0" max="20" step="0.1" required class="w-full px-4 py-3 bg-emerald-50 border-transparent rounded-xl focus:bg-white focus:ring-2 focus:ring-emerald-300 outline-none font-black text-emerald-700 text-xl" placeholder="0">
                    </div>
                    <div class="space-y-2 bg-white p-4 rounded-2xl border-2 border-purple-50 shadow-sm">
                        <label class="block text-[10px] font-black text-purple-400 uppercase tracking-tighter">Pentas (10%)</label>
                        <input type="number" id="v_stage" min="0" max="10" step="0.1" required class="w-full px-4 py-3 bg-purple-50 border-transparent rounded-xl focus:bg-white focus:ring-2 focus:ring-purple-300 outline-none font-black text-purple-700 text-xl" placeholder="0">
                    </div>
                    <div class="space-y-2 bg-white p-4 rounded-2xl border-2 border-pink-50 shadow-sm">
                        <label class="block text-[10px] font-black text-pink-400 uppercase tracking-tighter">Rupa (10%)</label>
                        <input type="number" id="v_style" min="0" max="10" step="0.1" required class="w-full px-4 py-3 bg-pink-50 border-transparent rounded-xl focus:bg-white focus:ring-2 focus:ring-pink-300 outline-none font-black text-pink-700 text-xl" placeholder="0">
                    </div>
                    
                    <div class="lg:col-span-5 pt-4">
                        <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-black py-5 rounded-[2rem] flex items-center justify-center gap-3 text-xl shadow-xl shadow-emerald-100 transition-all uppercase tracking-widest hover:-translate-y-1 active:scale-95">
                            <i data-lucide="save" class="w-6 h-6"></i> SIMPAN MARKAH
                        </button>
                    </div>
                </form>
            </div>
        </section>

        <!-- MODUL 3: STATISTIK / RUMUSAN -->
        <section id="page-statistik" class="hidden space-y-8 pb-12">
            
            <!-- Bahagian Cetakan (Hanya muncul semasa print) -->
            <div class="hidden print-header">
                <img src="image_7ec5c4.jpg" class="w-20 h-20 object-cover mx-auto mb-2 rounded-xl" alt="Logo">
                <h1 class="text-2xl font-black uppercase">LAPORAN KEPUTUSAN MARI MENYANYI</h1>
                <p class="text-sm font-bold text-slate-500 uppercase tracking-[0.2em]">KEPUTUSAN RASMI PERTANDINGAN KARAOKE</p>
            </div>

            <!-- Grid 3 Sebaris untuk Top 3 -->
            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6" id="topThreeCards"></div>

            <div class="bg-white/95 backdrop-blur-md rounded-[2.5rem] border border-indigo-50 overflow-hidden shadow-2xl">
                <div class="bg-gradient-to-r from-indigo-600 to-purple-600 p-6 flex justify-between items-center no-print">
                    <div class="flex items-center gap-2 text-white">
                        <i data-lucide="bar-chart-2" class="w-5 h-5"></i>
                        <h3 class="text-sm font-black uppercase tracking-widest">Keputusan Keseluruhan</h3>
                    </div>
                    <button onclick="window.print()" class="bg-white text-indigo-600 hover:bg-indigo-50 px-6 py-2.5 rounded-2xl transition-all font-black text-xs uppercase flex items-center gap-2 shadow-lg active:scale-95">
                        <i data-lucide="printer" class="w-4 h-4"></i> CETAK KEPUTUSAN
                    </button>
                </div>
                
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 border-b border-slate-100 text-[10px] text-slate-400 uppercase font-black">
                            <tr>
                                <th class="px-8 py-5">Ked</th>
                                <th class="px-8 py-5">Nama Peserta</th>
                                <th class="px-4 py-5 text-center">Vokal</th>
                                <th class="px-4 py-5 text-center">Tempo</th>
                                <th class="px-4 py-5 text-center">Hayati</th>
                                <th class="px-4 py-5 text-center">Pentas</th>
                                <th class="px-4 py-5 text-center">Rupa</th>
                                <th class="px-8 py-5 text-right text-indigo-600">Jumlah</th>
                            </tr>
                        </thead>
                        <tbody id="finalResults" class="divide-y divide-slate-50 bg-white"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyApySSqLX7_UPUDclsS7cbbFUb-YMebdBo",
            authDomain: "markahkaraoke.firebaseapp.com",
            projectId: "markahkaraoke",
            storageBucket: "markahkaraoke.firebasestorage.app",
            messagingSenderId: "31230997416",
            appId: "1:31230997416:web:d19280642cb7582d0c639d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-karaoke-app';

        const participantsCol = collection(db, 'artifacts', appId, 'public', 'data', 'participants');

        let data = [];
        let currentUserId = null;

        const initAuth = async () => {
            try { await signInAnonymously(auth); } catch (e) {
                const syncStatus = document.getElementById('syncStatus');
                syncStatus.classList.replace('text-emerald-500', 'text-red-500');
            }
        };
        initAuth();

        onAuthStateChanged(auth, (user) => { if (user) { currentUserId = user.uid; startSync(); } });

        function startSync() {
            onSnapshot(participantsCol, (snapshot) => {
                data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderAll();
            }, (error) => {
                console.error("Snapshot error:", error);
            });
        }

        window.switchTab = (tab) => {
            const tabs = ['pendaftaran', 'pemarkahan', 'statistik'];
            tabs.forEach(t => {
                document.getElementById(`page-${t}`).classList.add('hidden');
                document.getElementById(`btn-${t}`).classList.remove('tab-active');
                document.getElementById(`btn-${t}`).classList.add('text-slate-500');
            });
            document.getElementById(`page-${tab}`).classList.remove('hidden');
            document.getElementById(`btn-${tab}`).classList.add('tab-active');
            renderAll();
        };

        function renderAll() {
            renderRegList();
            populateJudgeSelect();
            renderFinalResults();
            lucide.createIcons();
        }

        document.getElementById('regForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('regName').value.trim();
            if(!name || !currentUserId) return;
            try {
                await addDoc(participantsCol, {
                    name, vocal: 0, tempo: 0, penghayatan: 0, stage: 0, style: 0, total: 0, hasJudged: false, createdAt: new Date().getTime()
                });
                document.getElementById('regName').value = '';
            } catch (err) { alert("Gagal menambah peserta."); }
        });

        window.renderRegList = () => {
            const list = document.getElementById('regList');
            if (data.length === 0) { list.innerHTML = `<tr><td colspan="4" class="p-12 text-center text-slate-300 font-medium italic">Tiada peserta didaftarkan lagi...</td></tr>`; return; }
            const sortedReg = [...data].sort((a,b) => (a.createdAt || 0) - (b.createdAt || 0));
            list.innerHTML = sortedReg.map((p, i) => `
                <tr class="hover:bg-indigo-50/30 transition-colors">
                    <td class="px-8 py-5 text-xs font-bold text-slate-300">${i+1}</td>
                    <td class="px-8 py-5 font-black text-slate-700 uppercase text-sm tracking-tight">${p.name}</td>
                    <td class="px-8 py-5 text-center">
                        ${p.hasJudged ? `<span class="bg-emerald-100 text-emerald-700 text-[9px] px-3 py-1 rounded-full font-black uppercase tracking-widest">Selesai</span>` 
                        : `<span class="bg-amber-100 text-amber-700 text-[9px] px-3 py-1 rounded-full font-black uppercase tracking-widest">Menunggu</span>`}
                    </td>
                    <td class="px-8 py-5 text-right">
                        <div class="flex justify-end gap-3">
                            <button onclick="editParticipant('${p.id}')" class="bg-blue-50 text-blue-500 hover:bg-blue-500 hover:text-white transition-all p-2 rounded-xl">
                                <i data-lucide="edit-2" class="w-4 h-4"></i>
                            </button>
                            <button onclick="deleteParticipant('${p.id}')" class="bg-red-50 text-red-400 hover:bg-red-500 hover:text-white transition-all p-2 rounded-xl">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
            lucide.createIcons();
        };

        window.editParticipant = async (id) => {
            const p = data.find(item => item.id === id);
            const newName = prompt("Kemaskini Nama Peserta:", p.name);
            if(newName && newName.trim() !== "") {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'participants', id), { name: newName.trim() });
            }
        };

        window.deleteParticipant = async (id) => {
            if(confirm('Hapus peserta ini secara kekal?')) {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'participants', id));
            }
        };

        window.populateJudgeSelect = () => {
            const select = document.getElementById('judgeSelect');
            const alphabetData = [...data].sort((a,b) => a.name.localeCompare(b.name));
            const currentValue = select.value;
            select.innerHTML = '<option value="">-- Sila Pilih Nama Peserta --</option>' + 
                alphabetData.map(p => `<option value="${p.id}" ${p.id === currentValue ? 'selected' : ''}>${p.name.toUpperCase()} ${p.hasJudged ? '✓' : ''}</option>`).join('');
        };

        document.getElementById('judgeSelect').addEventListener('change', (e) => {
            const form = document.getElementById('judgeForm');
            if(e.target.value) {
                form.classList.remove('opacity-20', 'pointer-events-none', 'scale-95');
                const p = data.find(item => item.id === e.target.value);
                document.getElementById('v_vocal').value = p.hasJudged ? p.vocal : '';
                document.getElementById('v_tempo').value = p.hasJudged ? p.tempo : '';
                document.getElementById('v_penghayatan').value = p.hasJudged ? p.penghayatan : '';
                document.getElementById('v_stage').value = p.hasJudged ? p.stage : '';
                document.getElementById('v_style').value = p.hasJudged ? p.style : '';
            } else { 
                form.classList.add('opacity-20', 'pointer-events-none', 'scale-95'); 
            }
        });

        document.getElementById('judgeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('judgeSelect').value;
            const v = parseFloat(document.getElementById('v_vocal').value) || 0;
            const t = parseFloat(document.getElementById('v_tempo').value) || 0;
            const ph = parseFloat(document.getElementById('v_penghayatan').value) || 0;
            const st = parseFloat(document.getElementById('v_stage').value) || 0;
            const sy = parseFloat(document.getElementById('v_style').value) || 0;
            try {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'participants', id), {
                    vocal: v, tempo: t, penghayatan: ph, stage: st, style: sy, total: v+t+ph+st+sy, hasJudged: true
                });
                alert('Markah disimpan!');
            } catch (err) {
                alert("Ralat menyimpan markah.");
            }
        });

        window.renderFinalResults = () => {
            const sorted = [...data].sort((a, b) => b.total - a.total);
            const body = document.getElementById('finalResults');
            body.innerHTML = sorted.map((p, i) => {
                const rowClass = i === 0 ? 'bg-indigo-50/50' : i === 1 ? 'bg-slate-50/50' : i === 2 ? 'bg-amber-50/40' : '';
                const rankLabel = i === 0 ? '🥇 JOHAN' : i === 1 ? '🥈 NAIB JOHAN' : i === 2 ? '🥉 KETIGA' : (i+1);
                return `
                    <tr class="${rowClass} transition-colors group">
                        <td class="px-8 py-6 font-black text-[10px] text-slate-800">${rankLabel}</td>
                        <td class="px-8 py-6 font-black text-slate-700 uppercase text-sm tracking-tight">${p.name}</td>
                        <td class="px-4 py-6 text-xs text-center font-bold text-slate-400">${p.vocal}</td>
                        <td class="px-4 py-6 text-xs text-center font-bold text-slate-400">${p.tempo}</td>
                        <td class="px-4 py-6 text-xs text-center font-bold text-slate-400">${p.penghayatan}</td>
                        <td class="px-4 py-6 text-xs text-center font-bold text-slate-400">${p.stage}</td>
                        <td class="px-4 py-6 text-xs text-center font-bold text-slate-400">${p.style}</td>
                        <td class="px-8 py-6 text-right font-black text-indigo-700 text-2xl">${p.total.toFixed(1)}</td>
                    </tr>
                `;
            }).join('');

            const topCards = document.getElementById('topThreeCards');
            if(sorted.length > 0) {
                topCards.innerHTML = sorted.slice(0, 3).map((p, i) => `
                    <div class="glass-card p-6 md:p-8 rounded-[3rem] border-b-8 ${i===0?'border-indigo-500 shadow-2xl':i===1?'border-slate-300 shadow-xl':'border-amber-400 shadow-xl'} no-print relative overflow-hidden flex flex-col justify-between h-full">
                        <div class="absolute -right-4 -top-4 opacity-5 pointer-events-none">
                            <i data-lucide="crown" class="w-32 h-32"></i>
                        </div>
                        <div>
                            <div class="flex justify-between items-start mb-6">
                                <span class="text-[9px] font-black uppercase px-4 py-2 ${i===0?'bg-indigo-600 text-white shadow-md':'bg-slate-200 text-slate-600'} rounded-full tracking-widest">
                                    ${i===0?'Juara Keseluruhan':i===1?'Naib Juara':'Tempat Ketiga'}
                                </span>
                                <div class="p-2.5 rounded-2xl ${i===0?'bg-yellow-100 text-yellow-600 shadow-sm':i===1?'bg-slate-100 text-slate-400 shadow-sm':'bg-amber-100 text-amber-600 shadow-sm'}">
                                    <i data-lucide="${i===0?'crown':i===1?'award':'medal'}" class="w-6 h-6"></i>
                                </div>
                            </div>
                            <h4 class="text-2xl font-black text-slate-800 uppercase truncate mb-4 tracking-tight">${p.name}</h4>
                        </div>
                        <div class="flex items-baseline gap-2 mt-auto">
                            <span class="text-5xl font-black text-indigo-700 tracking-tighter">${p.total.toFixed(1)}</span>
                            <span class="text-xs font-black text-slate-300">/ 100</span>
                        </div>
                    </div>
                `).join('');
                lucide.createIcons();
            } else { topCards.innerHTML = `<div class="md:col-span-3 glass-card p-12 text-center text-indigo-300 font-black uppercase text-xs tracking-[0.5em] no-print">Menunggu Markah Peserta Dimasukkan...</div>`; }
        };

        window.resetData = async () => {
            if(confirm('AMARAN: Padam semua data peserta dari pangkalan data Firebase secara kekal?')) {
                for (const p of data) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'participants', p.id));
            }
        };
        lucide.createIcons();
    </script>
</body>
</html>
